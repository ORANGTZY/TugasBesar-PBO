<!DOCTYPE html> <!-- Deklarasi bahwa ini adalah dokumen HTML5 -->
<html lang="id"> <!-- Elemen akar halaman, bahasa Indonesia -->
<head> <!-- Bagian kepala halaman — berisi pengaturan dan sumber daya -->
    <meta charset="UTF-8"> <!-- Mengatur karakter encoding ke UTF-8 agar teks bahasa Indonesia tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- Mengatur tampilan agar menyesuaikan layar HP, tanpa zoom -->
    <meta name="theme-color" content="#1A73E8"> <!-- Warna tema browser di HP Android -->
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- Mengizinkan halaman ini digunakan sebagai web app di iPhone -->
    <meta name="mobile-web-app-capable" content="yes"> <!-- Mengizinkan halaman ini digunakan sebagai web app di Android -->
    
    <title>Parkirin - Welcome</title> <!-- Judul tab browser -->
    <link rel="icon" href="/img/favicon.png" type="image/png"> <!-- Ikon kecil yang muncul di tab browser -->
    
    <script src="https://cdn.tailwindcss.com"></script> <!-- Mengimpor Tailwind CSS dari internet untuk membuat tampilan -->
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Montserrat+Alternates:wght@600&display=swap" rel="stylesheet"> <!-- Mengimpor font Montserrat dan Montserrat Alternates dari Google Fonts -->
    
    <style> 
        body {
            /* Background biru dengan efek elips/gelombang yang responsif */
            background-color: #1A73E8; /* Warna latar biru utama */
            background-image: radial-gradient(ellipse at 30% 40%, rgba(172, 198, 255, 0.25) 0%, transparent 50%), /* Efek gradien elips pertama di kiri atas */
                              radial-gradient(ellipse at 70% 60%, rgba(126, 171, 255, 0.2) 0%, transparent 50%); /* Efek gradien elips kedua di kanan bawah */
            font-family: 'Montserrat', sans-serif; /* Gunakan font Montserrat untuk semua teks */
            overscroll-behavior-y: none; /* Mencegah halaman bergulir berlebih saat ditarik */
            margin: 0; /* Hapus margin bawaan browser */
            overflow: hidden; /* Mencegah layar bisa di-scroll */
        }
        
        .font-alt { font-family: 'Montserrat Alternates', sans-serif; } /* Kelas untuk menggunakan varian font alternatif */

        /* Animasi fade in saat web dibuka */
        .fade-in {
            animation: fadeIn 1s ease-out forwards; /* Terapkan animasi fade-in selama 1 detik */
        }

        @keyframes fadeIn { /* Definisi animasi fade-in */
            from { opacity: 0; transform: scale(0.95); } /* Mulai dari transparan dan sedikit lebih kecil */
            to { opacity: 1; transform: scale(1); } /* Berakhir terlihat penuh dan ukuran normal */
        }

        /* Animasi khusus untuk loading dots */
        .dot-bounce {
            animation: bounce 1.4s infinite ease-in-out both; /* Animasi titik melompat berulang terus selama 1.4 detik */
        }
        .dot-1 { animation-delay: -0.32s; } /* Titik pertama mulai agak lebih awal */
        .dot-2 { animation-delay: -0.16s; } /* Titik kedua mulai sedikit lebih awal */
        
        @keyframes bounce { /* Definisi animasi melompat */
            0%, 80%, 100% { transform: scale(0); } /* Titik tidak terlihat di awal, tengah-akhir */
            40% { transform: scale(1); } /* Titik terlihat penuh di tengah animasi */
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen text-gray-800 antialiased relative"> <!-- Badan halaman: tata letak tengah, tinggi minimal penuh layar -->

    <!-- DEKORASI IKON LATAR BELAKANG (tidak bisa diklik) -->
    <svg xmlns="http://www.w3.org/2000/svg" class="absolute top-24 left-8 w-28 h-28 text-white opacity-5 transform -rotate-12 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"> <!-- Ikon lokasi/pin besar di kiri atas, sangat transparan sebagai dekorasi -->
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/> <!-- Bentuk ikon pin lokasi -->
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" class="absolute top-36 -right-6 w-36 h-36 text-white opacity-5 transform rotate-12 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"> <!-- Ikon parkir di kanan atas, sangat transparan sebagai dekorasi -->
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-6 10h-2v4H9V7h4.5c1.93 0 3.5 1.57 3.5 3.5S15.43 13 13 13zm0-4h-2v2h2c.55 0 1-.45 1-1s-.45-1-1-1z"/> <!-- Bentuk ikon huruf P (parkir) -->
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" class="absolute bottom-48 right-4 w-32 h-32 text-white opacity-5 transform rotate-6 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"> <!-- Ikon mobil di kanan bawah, sangat transparan sebagai dekorasi -->
        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/> <!-- Bentuk badan mobil -->
        <circle cx="7.5" cy="14.5" r="1.5"/> <!-- Roda kiri mobil -->
        <circle cx="16.5" cy="14.5" r="1.5"/> <!-- Roda kanan mobil -->
    </svg>

    <img src=".//img/elemenmotorcycle.png" alt="Elemen Motor" class="absolute bottom-20 -left-6 w-40 h-40 opacity-5 transform -rotate-12 pointer-events-none object-contain"> <!-- Gambar motor dekoratif di kiri bawah, sangat transparan -->


    <!-- KONTEN UTAMA SPLASH SCREEN -->
    <div class="w-full max-w-[402px] flex flex-col justify-center items-center min-h-screen relative px-4 fade-in z-10"> <!-- Wadah konten utama dengan animasi fade-in -->
        
        <img src=".//img/LOGO.png" alt="Logo Parkirin" class="h-12 md:h-14 object-contain drop-shadow-xl mb-4"> <!-- Logo Parkirin dengan bayangan -->
        
        <h2 class="font-alt text-white/90 text-[12px] md:text-[14px] font-bold tracking-[0.2em] uppercase text-center drop-shadow-md"> <!-- Tagline aplikasi -->
            Smart Parking System
        </h2>

        <!-- ANIMASI LOADING DOTS: Tiga titik yang melompat bergantian -->
        <div class="flex space-x-2 mt-12"> <!-- Wadah untuk tiga titik loading -->
            <div class="w-2.5 h-2.5 bg-white rounded-full dot-bounce dot-1 shadow-sm"></div> <!-- Titik loading pertama (mulai lebih awal) -->
            <div class="w-2.5 h-2.5 bg-white rounded-full dot-bounce dot-2 shadow-sm"></div> <!-- Titik loading kedua (mulai sedikit lebih awal) -->
            <div class="w-2.5 h-2.5 bg-white rounded-full dot-bounce shadow-sm"></div> <!-- Titik loading ketiga (mulai paling akhir) -->
        </div>
        
    </div>

    <!-- NOMOR VERSI DI BAWAH HALAMAN -->
    <div class="absolute bottom-8 w-full text-center z-10 fade-in"> <!-- Posisi absolut di bawah halaman -->
        <p class="text-white/50 text-[10px] font-semibold tracking-wider">VERSI 1.0.0</p> <!-- Teks nomor versi aplikasi -->
    </div>

    <script>
        // Splash screen tampil selama 3 detik agar animasi loading sempat terlihat
        const SPLASH_DURATION = 3000; // Durasi tampil splash screen dalam milidetik (3000ms = 3 detik)

        setTimeout(() => {
            // Mengarahkan SEMUA pengguna ke Onboarding 1
            window.location.href = "/onboarding-1"; // Setelah 3 detik, pindah otomatis ke halaman onboarding pertama
        }, SPLASH_DURATION);
    </script>
</body>
</html>
