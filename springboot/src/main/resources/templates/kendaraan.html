<!DOCTYPE html> <!-- Deklarasi bahwa ini adalah dokumen HTML5 -->
<html lang="id"> <!-- Elemen akar halaman, bahasa Indonesia -->
<head> <!-- Bagian kepala halaman — berisi pengaturan dan sumber daya -->
    <meta charset="UTF-8"> <!-- Mengatur karakter encoding ke UTF-8 agar teks bahasa Indonesia tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- Mengatur tampilan agar menyesuaikan layar HP, tanpa zoom -->
    <meta name="theme-color" content="#F5F5F5"> <!-- Warna tema browser di HP Android -->
    
    <title>Parkirin - Kendaraan Anda</title> <!-- Judul tab browser -->
    <link rel="icon" href="/img/favicon.png" type="image/png"> <!-- Ikon kecil yang muncul di tab browser -->
    
    <script src="https://cdn.tailwindcss.com"></script> <!-- Mengimpor Tailwind CSS dari internet untuk membuat tampilan -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"> <!-- Mengimpor font Montserrat dari Google Fonts -->
    
    <style> 
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; } /* Font Montserrat, latar abu-abu muda, tanpa margin dan scroll berlebih */
        .hide-scrollbar::-webkit-scrollbar { display: none; } /* Sembunyikan scrollbar di Chrome/Safari */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } /* Sembunyikan scrollbar di IE dan Firefox */
        .slide-in { animation: slideInRight 0.3s ease-out forwards; } /* Kelas animasi: geser masuk dari kanan */
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } } /* Definisi animasi geser masuk dari kanan */
        .vehicle-card { transition: all 0.2s ease-in-out; } /* Animasi transisi halus untuk kartu kendaraan saat dipilih */
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200"> <!-- Badan halaman: tata letak tengah, tinggi penuh layar -->

    <!-- WADAH UTAMA HALAMAN KENDARAAN -->
    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in"> <!-- Wadah utama dengan animasi slide-in dari kanan -->
        
        <!-- HEADER: Tombol kembali dan judul halaman -->
        <div class="w-full h-[120px] bg-[#F5F5F5] pt-12 px-4 flex items-center shadow-sm z-20 shrink-0"> <!-- Bar atas halaman dengan tinggi 120px -->
            <a href="/profil" class="text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer mr-3"> <!-- Tautan kembali ke halaman profil -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg> <!-- Ikon panah kembali -->
            </a>
            <h1 class="text-[20px] font-bold text-[#0064F0]">Kendaraan Anda</h1> <!-- Judul halaman -->
        </div>

        <!-- DAFTAR KENDARAAN (diisi oleh JavaScript) -->
        <div id="kendaraan-list" class="flex-grow overflow-y-auto hide-scrollbar z-10 flex flex-col mt-[11px] gap-[11px] pb-24 relative px-2"> <!-- Wadah daftar kendaraan — diisi secara dinamis oleh JavaScript -->
            </div>

        <!-- FOOTER: Tombol Pilih Utama dan Tombol Tambah -->
        <div class="absolute bottom-0 w-full h-[81px] bg-[#F5F5F5] border-t border-[#D9D9D9] flex items-center px-4 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]"> <!-- Bar bawah halaman -->
            <button onclick="jadikanUtama()" class="w-[177px] h-[28px] border border-[#0141A3] bg-white rounded-[8px] flex items-center justify-center hover:bg-blue-50 active:scale-95 transition-all"> <!-- Tombol untuk menjadikan kendaraan terpilih sebagai kendaraan utama -->
                <span class="text-[14px] text-[#0141A3] font-medium">Pilih Sebagai Utama</span> <!-- Teks tombol -->
            </button>
            <a href="/tambah-kendaraan" class="absolute -top-[24px] right-6 w-[65px] h-[65px] bg-[#0141A3] rounded-full shadow-lg hover:bg-blue-800 active:scale-90 transition-all z-30 flex items-center justify-center"> <!-- Tombol bulat "+" untuk tambah kendaraan baru -->
                <div class="relative flex items-center justify-center"> <!-- Wadah ikon plus -->
                     <div class="w-[30px] h-[5px] bg-white rounded-[2px] absolute"></div> <!-- Garis horizontal ikon plus -->
                     <div class="w-[5px] h-[30px] bg-white rounded-[2px] absolute"></div> <!-- Garis vertikal ikon plus -->
                </div>
            </a>
        </div>

        <!-- NOTIFIKASI SUKSES (muncul sementara setelah ganti kendaraan utama) -->
        <div id="alertSuccess" class="absolute top-[130px] left-1/2 transform -translate-x-1/2 bg-[#0141A3] text-white px-4 py-2 rounded-full text-[12px] font-semibold shadow-md transition-all duration-300 opacity-0 pointer-events-none z-50"> <!-- Pemberitahuan sukses yang muncul sebentar di tengah atas -->
            Berhasil diubah!
        </div>
    </div>

    <script>
        let kendaraanTerpilihId = null; // Variabel untuk menyimpan ID kendaraan yang sedang dipilih pengguna
        let userData = JSON.parse(localStorage.getItem('user')); // Ambil data pengguna dari penyimpanan lokal browser

        document.addEventListener("DOMContentLoaded", () => { // Jalankan setelah seluruh elemen halaman selesai dimuat
            if(!userData) window.location.href = "/login"; // Jika pengguna belum login, arahkan ke halaman login
            fetchKendaraan(); // Ambil dan tampilkan daftar kendaraan pengguna
        });

        async function fetchKendaraan() { // Fungsi untuk mengambil daftar kendaraan dari server
            try {
                const res = await fetch(`/api/kendaraan/${userData.id}`); // Kirim permintaan ke API kendaraan dengan ID pengguna
                const result = await res.json(); // Ubah respons dari JSON menjadi objek JavaScript
                renderKendaraan(result.data || []); // Tampilkan daftar kendaraan (atau daftar kosong jika tidak ada data)
            } catch (err) {
                console.error("Gagal load kendaraan"); // Catat error jika gagal memuat kendaraan
            }
        }

        function renderKendaraan(daftarKendaraan) { // Fungsi untuk menampilkan daftar kendaraan di layar
            const container = document.getElementById('kendaraan-list'); // Ambil elemen wadah daftar kendaraan
            container.innerHTML = ''; // Kosongkan konten lama sebelum diisi yang baru

            daftarKendaraan.forEach((kendaraan) => { // Proses setiap kendaraan satu per satu
                const isUtamaHidden = kendaraan.is_utama ? '' : 'hidden'; // Jika kendaraan utama, tampilkan ikon bintang; jika tidak, sembunyikan
                const cardHTML = ` <!-- Template HTML untuk satu kartu kendaraan -->
                <div onclick="pilihKendaraan(this, ${kendaraan.id})" class="vehicle-card w-full min-h-[82px] bg-[#F5F5F5] border-2 border-transparent rounded-lg flex items-center justify-between px-4 py-3 shadow-sm select-none cursor-pointer">
                    <div class="flex items-center gap-4 pointer-events-none">
                        <div class="w-[91px] h-[53px] bg-[#D9D9D9] border-2 border-[#0F172A] rounded-[5px] flex items-center justify-center p-[2px] shrink-0">
                            <div class="w-full h-full bg-[#0F172A] rounded-[3px] flex items-center justify-center">
                                <span class="text-white text-[12px] font-semibold tracking-wide">${kendaraan.plat}</span> <!-- Nomor plat kendaraan -->
                            </div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <span class="text-[12px] font-semibold text-black leading-tight">${kendaraan.merek} ${kendaraan.model}</span> <!-- Merek dan model kendaraan -->
                            <span class="text-[10px] text-black mt-1">${kendaraan.warna}</span> <!-- Warna kendaraan -->
                        </div>
                    </div>
                    <div class="flex items-center gap-[18px]">
                        <div class="status-utama flex items-center gap-1 ${isUtamaHidden}"> <!-- Ikon bintang untuk kendaraan utama -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#0062E6]" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <span class="text-[10px] text-black opacity-60">Utama</span> <!-- Label "Utama" -->
                        </div>
                        <a href="/edit-kendaraan?id=${kendaraan.id}" onclick="event.stopPropagation()" class="text-[10px] font-semibold text-[#0062E6] hover:opacity-70 active:scale-95 transition-all z-10 relative">EDIT</a> <!-- Tautan ke halaman edit kendaraan -->
                    </div>
                </div>`;
                container.innerHTML += cardHTML; // Tambahkan kartu kendaraan ke dalam daftar
            });
        }

        function pilihKendaraan(elemenKartu, id) { // Fungsi untuk memilih kartu kendaraan (highlight border biru)
            const semuaKartu = document.querySelectorAll('.vehicle-card'); // Ambil semua kartu kendaraan
            semuaKartu.forEach(kartu => { // Reset tampilan semua kartu ke normal
                kartu.classList.remove('border-[#0141A3]', 'bg-blue-50'); // Hapus border biru dan latar biru muda
                kartu.classList.add('border-transparent', 'bg-[#F5F5F5]'); // Kembalikan ke border transparan dan latar abu-abu
            });
            elemenKartu.classList.remove('border-transparent', 'bg-[#F5F5F5]'); // Hapus tampilan normal dari kartu yang dipilih
            elemenKartu.classList.add('border-[#0141A3]', 'bg-blue-50'); // Beri border biru dan latar biru muda pada kartu terpilih
            kendaraanTerpilihId = id; // Simpan ID kendaraan yang dipilih
        }

        async function jadikanUtama() { // Fungsi untuk menjadikan kendaraan terpilih sebagai kendaraan utama
            if (!kendaraanTerpilihId) { // Jika belum ada kendaraan yang dipilih
                alert("Silakan klik salah satu kendaraan."); return; // Tampilkan peringatan dan hentikan eksekusi
            }
            try {
                const response = await fetch(`/api/kendaraan/utama/${kendaraanTerpilihId}`, { // Kirim permintaan PUT ke API ganti kendaraan utama
                    method: 'PUT', // Gunakan metode PUT untuk pembaruan
                    headers: { 'Content-Type': 'application/json' }, // Beritahu server data dalam format JSON
                    body: JSON.stringify({ user_id: userData.id }) // Kirim ID pengguna
                });
                if(response.ok) { // Jika berhasil mengganti kendaraan utama
                    fetchKendaraan(); // Refresh daftar kendaraan dari API
                    kendaraanTerpilihId = null; // Reset kendaraan yang dipilih
                    const alertBox = document.getElementById('alertSuccess'); // Ambil elemen notifikasi sukses
                    alertBox.classList.remove('opacity-0'); // Tampilkan notifikasi
                    alertBox.classList.add('opacity-100'); // Buat terlihat penuh
                    setTimeout(() => { alertBox.classList.remove('opacity-100'); alertBox.classList.add('opacity-0'); }, 2500); // Sembunyikan notifikasi setelah 2.5 detik
                }
            } catch (err) {
                alert('Server Error'); // Tampilkan pesan error jika terjadi masalah koneksi
            }
        }
    </script>
</body>
</html>
