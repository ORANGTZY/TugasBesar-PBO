<!DOCTYPE html> <!-- Deklarasi bahwa ini adalah dokumen HTML5 -->
<html lang="id"> <!-- Elemen akar halaman, bahasa Indonesia -->
<head> <!-- Bagian kepala halaman -->
    <meta charset="UTF-8"> <!-- Encoding UTF-8 agar teks Indonesia tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- Tampilan responsif di HP -->
    <meta name="theme-color" content="#F5F5F5"> <!-- Warna tema browser di Android -->
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- Dukungan web app untuk iOS -->
    <meta name="mobile-web-app-capable" content="yes"> <!-- Dukungan web app untuk Android -->
    
    <title>Parkirin - Kupon Saya</title> <!-- Judul tab browser -->
    <link rel="icon" href="/img/favicon.png" type="image/png"> <!-- Ikon tab browser -->

    <script src="https://cdn.tailwindcss.com"></script> <!-- Tailwind CSS dari internet -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"> <!-- Font Montserrat -->
    
    <style> 
        body {
            background-color: #F1F1F1; /* Warna latar belakang abu-abu muda */
            font-family: 'Montserrat', sans-serif; /* Menggunakan font Montserrat */
            overscroll-behavior-y: none; /* Mencegah efek karet saat scroll di HP */
            margin: 0; /* Menghilangkan margin luar bawaan browser */
        }

        /* Animasi masuk halaman */
        .slide-in-right {
            animation: slideIn 0.3s ease-out forwards; /* Mengatur animasi masuk slideInRight */
        }
        @keyframes slideIn { /* Keyframe animasi geser */
            from { opacity: 0; transform: translateX(20px); } /* Mulai dari luar kanan dan transparan */
            to { opacity: 1; transform: translateX(0); } /* Berhenti di posisi normal dan tidak transparan */
        }

        /* Animasi pergantian tab */
        .fade-in {
            animation: fadeIn 0.2s ease-in-out forwards; /* Mengatur animasi muncul fadeIn */
        }
        @keyframes fadeIn { /* Keyframe animasi muncul perlahan dari bawah */
            from { opacity: 0; transform: translateY(5px); } /* Mulai sedikit lebih rendah dan transparan */
            to { opacity: 1; transform: translateY(0); } /* Naik ke posisi normal dan solid */
        }

        /* Hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; } /* Sembunyikan scrollbar di peramban berbasis WebKit (Chrome/Safari) */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } /* Sembunyikan scrollbar di Firefox dan IE */
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased"> <!-- Bagian utama halaman -->

    <!-- WADAH HALAMAN -->
    <div class="w-full max-w-[402px] bg-[#F1F1F1] min-h-screen relative flex flex-col shadow-2xl overflow-hidden slide-in-right"> <!-- Kontainer gaya aplikasi ponsel -->
        
        <!-- BAGIAN HEADER ATAS -->
        <div class="bg-[#F5F5F5] w-full pt-10 pb-4 px-4 z-10"> <!-- Latar belakang putih sedikit keabuan untuk bagian atas -->
            <div class="flex items-center mb-6"> <!-- Baris yang memuat tombol kembali dan judul -->
                <a href="/user-dashboard" class="text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer mr-3"> <!-- Tombol kembali ke Beranda/Dashboard -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5"> <!-- Ikon tanda panah kiri -->
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /> <!-- Bentuk anak panah -->
                    </svg>
                </a>
                <h1 class="text-[20px] font-bold text-[#0064F0]">Kupon Saya</h1> <!-- Judul Halaman -->
            </div>

            <!-- TAMPILAN POIN PENGGUNA -->
            <div class="border-2 border-[#0064F0] bg-[#F5F5F5] rounded-[10px] px-4 py-3 flex justify-between items-center shadow-sm"> <!-- Kotak yang menampilkan poin -->
                <div class="flex items-center gap-3"> <!-- Bagian sebelah kiri (Tulisan Points dan Ikon) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#89E7F9]" viewBox="0 0 20 20" fill="currentColor"> <!-- Ikon Bintang Poin -->
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /> <!-- Bentuk Bintang -->
                    </svg>
                    <span class="font-semibold text-[15px] text-[#0F252A]">Points</span> <!-- Tulisan Points -->
                </div>
                <div class="flex items-center gap-2 cursor-pointer active:opacity-70"> <!-- Bagian sebelah kanan (Nilai Poin dan Panah) -->
                    <span class="font-semibold text-[15px] text-[#0F252A]">0</span> <!-- Jumlah Poin saat ini (ditampilkan statis 0) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#0064F0]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"> <!-- Ikon Panah Kecil Kanan -->
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /> <!-- Bentuk Panah -->
                    </svg>
                </div>
            </div>

            <!-- TOMBOL PILIHAN TAB (KUPON, HADIAH, MISI) -->
            <div class="flex gap-3 mt-5"> <!-- Wadah tombol-tombol pilihan section -->
                <button id="btn-kupon" onclick="switchTab('kupon')" class="px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-[#0064F0] text-white border border-[#0064F0] transition-colors focus:outline-none"> <!-- Tombol tab Kupon (Aktif Pertama) -->
                    Kupon Saya <!-- Teks Tombol -->
                </button>
                <button id="btn-hadiah" onclick="switchTab('hadiah')" class="px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-white text-black border border-black transition-colors focus:outline-none"> <!-- Tombol tab Hadiah (Tidak Aktif) -->
                    Hadiah <!-- Teks Tombol -->
                </button>
                <button id="btn-misi" onclick="switchTab('misi')" class="px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-white text-black border border-black transition-colors focus:outline-none"> <!-- Tombol tab Misi (Tidak Aktif) -->
                    Misi <!-- Teks Tombol -->
                </button>
            </div>
        </div>

        <!-- BAGIAN KONTEN (Menampilkan Isi Tab) -->
        <div class="flex-grow bg-[#F1F1F1] mt-2 relative z-0 overflow-y-auto hide-scrollbar"> <!-- Wadah area konten yang bisa digulir kebawah -->
            
            <!-- KONTEN TAB KUPON (Default Tampil) -->
            <div id="view-kupon" class="block fade-in"> <!-- Bagian khusus Kupon -->
                <div onclick="toggleAccordion('content-kupon', 'arrow-kupon')" class="bg-[#F5F5F5] rounded-[10px] py-4 px-6 flex justify-between items-center mx-1 shadow-sm cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors select-none"> <!-- Kotak yang bisa diklik untuk membuka/menutup accordion (dropdown) -->
                    <span class="font-semibold text-[15px] text-[#0F252A]">Parkir</span> <!-- Judul kategori (Kupon Parkir) -->
                    <svg id="arrow-kupon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0064F0] transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"> <!-- Ikon tanda panah bawah -->
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /> <!-- Bentuk Panah -->
                    </svg>
                </div>
                
                <div id="content-kupon" class="block mt-2 bg-[#F5F5F5] rounded-[10px] min-h-[300px] w-full p-4 mx-1"> <!-- Wadah isi dari accordion Kupon -->
                    <p class="text-gray-400 text-center text-xs mt-10">Belum ada kupon yang tersedia.</p> <!-- Pesan saat ini: Belum ada kupon -->
                </div>
            </div>

            <!-- KONTEN TAB HADIAH (Default Sembunyi) -->
            <div id="view-hadiah" class="hidden fade-in"> <!-- Bagian khusus Hadiah -->
                <div onclick="toggleAccordion('content-hadiah', 'arrow-hadiah')" class="bg-[#F5F5F5] rounded-[10px] py-4 px-6 flex justify-between items-center mx-1 shadow-sm cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors select-none"> <!-- Kotak klik buka/tutup Hadiah -->
                    <span class="font-semibold text-[15px] text-[#0F252A]">Semua</span> <!-- Judul kategori Hadiah -->
                    <svg id="arrow-hadiah" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0064F0] transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"> <!-- Ikon Panah Bawah -->
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /> <!-- Bentuk Panah -->
                    </svg>
                </div>
                
                <div id="content-hadiah" class="block mt-2 bg-[#F5F5F5] rounded-t-[10px] min-h-[500px] w-full pt-4 px-4 pb-20 mx-1"> <!-- Wadah isi dari accordion Hadiah -->
                    <div class="bg-[#F5F5F5] border border-gray-200 rounded-[15px] overflow-hidden shadow-md"> <!-- Kartu contoh Promo/Hadiah -->
                        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=600&auto=format&fit=crop" alt="Promo Banner" class="w-full h-[130px] object-cover"> <!-- Gambar Poster Promo Hadiah dari Unsplash -->
                        <div class="px-4 py-3 bg-[#F5F5F5]"> <!-- Kotak teks detail promo -->
                            <h3 class="font-bold text-[15px] text-black">Referal</h3> <!-- Nama promo (misal Referal) -->
                            <p class="text-[10px] font-semibold text-black/80 mt-0.5">Active until 31 Dec 2031</p> <!-- Batas aktif promo -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- KONTEN TAB MISI (Default Sembunyi) -->
            <div id="view-misi" class="hidden fade-in"> <!-- Bagian khusus Misi -->
                <div onclick="toggleAccordion('content-misi', 'arrow-misi')" class="bg-[#F5F5F5] rounded-[10px] py-4 px-6 flex justify-between items-center mx-1 shadow-sm cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors select-none"> <!-- Kotak klik buka/tutup Misi -->
                    <span class="font-semibold text-[15px] text-[#0F252A]">Parkir</span> <!-- Judul kategori (Misi Parkir) -->
                    <svg id="arrow-misi" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0064F0] transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"> <!-- Ikon Panah Bawah -->
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /> <!-- Bentuk Panah -->
                    </svg>
                </div>
                
                <div id="content-misi" class="block mt-2 bg-[#F5F5F5] rounded-[10px] min-h-[300px] w-full p-4 mx-1"> <!-- Wadah isi dari accordion Misi -->
                    <p class="text-gray-400 text-center text-xs mt-10">Belum ada misi yang berjalan.</p> <!-- Pesan saat ini: Belum ada misi -->
                </div>
            </div>

        </div>

    </div>

    <script>
        // Logika Pindah Tab (Kupon, Hadiah, Misi)
        function switchTab(tabId) { // Fungsi untuk memindahkan halaman tab ketika tombol diklik
            const tabs = ['kupon', 'hadiah', 'misi']; // Mendefinisikan array nama-nama tab yang ada

            tabs.forEach(id => { // Lakukan pengulangan ke setiap tab yang ada
                const btn = document.getElementById(`btn-${id}`); // Ambil elemen tombol tab
                const view = document.getElementById(`view-${id}`); // Ambil elemen konten/tampilan dari tab

                if (id === tabId) { // Jika tab saat ini adalah tab yang dipilih pengguna
                    btn.className = "px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-[#0064F0] text-white border border-[#0064F0] transition-colors focus:outline-none"; // Jadikan warna tombol Biru
                    view.classList.remove('hidden'); // Hilangkan fungsi sembunyi pada tampilannya
                    view.classList.add('block'); // Tampilkan blok konten ke layar
                } else { // Jika tab ini bukan yang dipilih pengguna
                    btn.className = "px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-white text-black border border-black transition-colors focus:outline-none"; // Jadikan warna tombol Putih (Tidak aktif)
                    view.classList.remove('block'); // Hilangkan bentuk tampilannya
                    view.classList.add('hidden'); // Sembunyikan blok konten dari layar
                }
            });
        }

        // Logika Buka Tutup Accordion (Kotak Area)
        function toggleAccordion(contentId, arrowId) { // Fungsi untuk membuka atau menutup kotak panjang (accordion)
            const content = document.getElementById(contentId); // Ambil isi dalam kotak berdasarkan ID
            const arrow = document.getElementById(arrowId); // Ambil tanda panah pada kotak berdasarkan ID

            if (content.classList.contains('hidden')) { // Cek apakah isi kotak sedang disembunyikan
                // Sedang tertutup, kita BUKA
                content.classList.remove('hidden'); // Hapus class yang menyembunyikan isi
                content.classList.add('block'); // Tambahkan class yang menampilkan isi
                
                // Panah menghadap Bawah (V)
                arrow.classList.remove('-rotate-90'); // Hilangkan rotasi untuk membuat panah menghadap bawah lagi
            } else { // Jika isi kotak sedang terbuka
                // Sedang terbuka, kita TUTUP
                content.classList.remove('block'); // Hapus class yang menampilkan isi
                content.classList.add('hidden'); // Tambahkan class untuk menyembunyikan isi
                
                // Panah diputar 90 derajat berlawanan jarum jam (Menghadap Kanan/Samping >)
                arrow.classList.add('-rotate-90'); // Tambahkan animasi putar agar panah menunjuk ke samping kanan
            }
        }
    </script>
</body>
</html>
