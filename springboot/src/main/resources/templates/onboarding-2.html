<!DOCTYPE html> <!-- Deklarasi bahwa ini adalah dokumen HTML5 -->
<html lang="id"> <!-- Elemen akar halaman, bahasa Indonesia -->
<head> <!-- Bagian kepala halaman — berisi pengaturan dan sumber daya -->
    <meta charset="UTF-8"> <!-- Mengatur karakter encoding ke UTF-8 agar teks bahasa Indonesia tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- Mengatur tampilan agar menyesuaikan layar HP, tanpa zoom -->
    <meta name="theme-color" content="#1A73E8"> <!-- Warna tema browser di HP Android -->
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- Mengizinkan halaman ini digunakan sebagai web app di iPhone -->
    
    <title>Parkirin - Onboarding 2</title> <!-- Judul tab browser -->
    <link rel="icon" href="/img/favicon.png" type="image/png"> <!-- Ikon kecil yang muncul di tab browser -->
    
    <script src="https://cdn.tailwindcss.com"></script> <!-- Mengimpor Tailwind CSS dari internet untuk membuat tampilan -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"> <!-- Mengimpor font Montserrat dari Google Fonts -->
    
    <style> 
        body {
            background-color: #1A73E8; /* Warna latar belakang biru utama */
            background-image: radial-gradient(circle at 10% 20%, rgba(172, 198, 255, 0.2) 0%, transparent 40%), /* Efek gradien cahaya di kiri atas */
                              radial-gradient(circle at 90% 80%, rgba(126, 171, 255, 0.2) 0%, transparent 40%); /* Efek gradien cahaya di kanan bawah */
            font-family: 'Montserrat', sans-serif; /* Gunakan font Montserrat untuk semua teks */
            overscroll-behavior-y: none; /* Mencegah halaman bergulir berlebih saat ditarik */
        }
        
        /* Animasi masuk perlahan */
        .slide-up {
            animation: slideUp 0.6s ease-out forwards; /* Terapkan animasi geser ke atas selama 0.6 detik */
        }
        @keyframes slideUp { /* Definisi animasi geser ke atas */
            from { opacity: 0; transform: translateY(20px); } /* Mulai dari bawah dan transparan */
            to { opacity: 1; transform: translateY(0); } /* Berakhir di posisi normal dan terlihat */
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased"> <!-- Badan halaman: tata letak tengah, tinggi minimal penuh layar -->

    <!-- WADAH UTAMA HALAMAN ONBOARDING 2 -->
    <div class="w-full max-w-[402px] flex flex-col min-h-screen relative px-4 py-8"> <!-- Wadah konten: lebar maksimal 402px, padding horizontal dan vertikal -->
        
        <!-- LOGO PARKIRIN -->
        <div class="flex justify-center items-center mb-6 mt-4 slide-up"> <!-- Wadah logo dengan animasi slide-up -->
            <img src=".//img/LOGO.png" alt="Logo Parkirin" class="h-9 object-contain drop-shadow-md"> <!-- Logo Parkirin dengan bayangan -->
        </div>

        <!-- KARTU KONTEN ONBOARDING -->
        <div class="bg-[#EAF8FC] rounded-[15px] p-6 shadow-xl flex-grow flex flex-col items-center text-center relative slide-up" style="animation-delay: 0.1s;"> <!-- Kartu biru muda dengan animasi terlambat 0.1 detik -->
            
            <!-- JUDUL FITUR -->
            <h1 class="text-[20px] font-bold text-black mt-2 mb-8 leading-snug px-2"> <!-- Judul utama halaman onboarding kedua -->
                Periksa Ketersediaan Parkir Secara Waktu Nyata <!-- Teks judul yang menjelaskan fitur real-time -->
            </h1>

            <!-- ILUSTRASI ONBOARDING -->
            <img src=".//img/onboarding2.png" alt="Ilustrasi Ketersediaan Parkir" class="w-full max-w-[280px] object-contain mb-8 drop-shadow-sm"> <!-- Gambar ilustrasi ketersediaan parkir dengan lebar maksimal 280px -->

            <!-- DESKRIPSI FITUR -->
            <p class="text-[14px] font-medium text-black leading-relaxed px-1 mb-8"> <!-- Paragraf penjelasan fitur real-time -->
                Lihat slot parkir kosong secara real-time dan pesan sebelum tiba. Tidak ada lagi pencarian di menit terakhir <!-- Teks deskripsi fitur ketersediaan real-time -->
            </p>

            <!-- INDIKATOR HALAMAN (titik navigasi) -->
            <div class="flex gap-2.5 mt-auto mb-6 justify-center items-center"> <!-- Wadah indikator titik halaman -->
                <div class="w-[10px] h-[10px] bg-[#D9D9D9] rounded-full transition-all"></div> <!-- Titik abu-abu bulat = halaman tidak aktif (halaman 1) -->
                <div class="w-7 h-[10px] bg-[#0064F0] rounded-full transition-all"></div> <!-- Titik biru panjang = halaman aktif (halaman 2) -->
            </div>

            <!-- TAUTAN MASUK (untuk yang sudah punya akun) -->
            <div class="mb-4 text-center w-full"> <!-- Wadah teks "sudah punya akun" -->
                <span class="text-[11px] text-gray-700">Sudah punya akun? </span> <!-- Teks pertanyaan untuk pengguna lama -->
                <a href="/login" class="text-[11px] text-[#0064F0] font-semibold hover:underline">Masuk</a> <!-- Tautan ke halaman login -->
            </div>

            <!-- TOMBOL DAFTAR -->
            <a href="/register" class="w-full mb-2"> <!-- Tautan ke halaman pendaftaran akun baru -->
                <button class="w-full bg-[#0141A3] hover:bg-blue-900 text-white font-semibold text-[13px] h-[48px] rounded-[10px] shadow-md transition-all active:scale-95"> <!-- Tombol utama untuk mendaftar -->
                    Daftar
                </button>
            </a>

        </div>
    </div>

</body>
</html>
