<!DOCTYPE html> <!-- Deklarasi bahwa ini adalah dokumen HTML5 -->
<html lang="id"> <!-- Elemen akar halaman, bahasa Indonesia -->
<head> <!-- Bagian kepala halaman — berisi pengaturan dan sumber daya -->
    <meta charset="UTF-8"> <!-- Mengatur karakter encoding ke UTF-8 agar teks bahasa Indonesia tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- Mengatur tampilan agar menyesuaikan layar HP, tanpa zoom -->
    <meta name="theme-color" content="#1A73E8"> <!-- Warna tema browser di HP Android -->
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- Mengizinkan halaman ini digunakan sebagai web app di iPhone -->
    
    <title>Parkirin - Lupa Password</title> <!-- Judul tab browser -->
    <link rel="icon" href="/img/favicon.png" type="image/png"> <!-- Ikon kecil yang muncul di tab browser -->
    
    <script src="https://cdn.tailwindcss.com"></script> <!-- Mengimpor Tailwind CSS dari internet untuk membuat tampilan -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"> <!-- Mengimpor font Montserrat dari Google Fonts -->
    
    <style> 
        body {
            background-color: #1A73E8; /* Warna latar belakang biru utama */
            background-image: radial-gradient(circle at 10% 20%, rgba(172, 198, 255, 0.2) 0%, transparent 40%), /* Efek gradien cahaya di kiri atas */
                              radial-gradient(circle at 90% 80%, rgba(126, 171, 255, 0.2) 0%, transparent 40%); /* Efek gradien cahaya di kanan bawah */
            font-family: 'Montserrat', sans-serif; /* Gunakan font Montserrat untuk semua teks */
            overscroll-behavior-y: none; /* Mencegah halaman bergulir berlebih saat ditarik */
        }
        
        /* Animasi masuk dari bawah */
        .slide-up {
            animation: slideUp 0.6s ease-out forwards; /* Terapkan animasi geser ke atas selama 0.6 detik */
        }
        @keyframes slideUp { /* Definisi animasi geser ke atas */
            from { opacity: 0; transform: translateY(20px); } /* Mulai dari bawah dan transparan */
            to { opacity: 1; transform: translateY(0); } /* Berakhir di posisi normal dan terlihat */
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased"> <!-- Badan halaman: tata letak tengah, tinggi minimal penuh layar -->

    <!-- WADAH UTAMA HALAMAN LUPA PASSWORD -->
    <div class="w-full max-w-[402px] flex flex-col min-h-screen relative px-4 py-8"> <!-- Wadah konten: lebar maksimal 402px, padding horizontal dan vertikal -->
        
        <!-- LOGO PARKIRIN -->
        <div class="flex justify-center items-center mb-6 mt-4 slide-up"> <!-- Wadah logo dengan animasi slide-up -->
            <img src=".//img/LOGO.png" alt="Logo Parkirin" class="h-9 object-contain drop-shadow-md"> <!-- Logo Parkirin dengan bayangan -->
        </div>

        <!-- KARTU KONTEN LUPA PASSWORD -->
        <div class="bg-[#EAF8FC] rounded-[15px] p-6 shadow-xl flex-grow flex flex-col items-center text-center relative slide-up" style="animation-delay: 0.1s;"> <!-- Kartu biru muda dengan animasi terlambat 0.1 detik -->
            
            <!-- TOMBOL KEMBALI KE LOGIN -->
            <a href="/login" class="absolute top-6 left-5 text-gray-500 hover:text-black transition-colors"> <!-- Tombol panah kembali di pojok kiri atas kartu -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"> <!-- Ikon panah kembali -->
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /> <!-- Bentuk panah ke kiri -->
                </svg>
            </a>

            <!-- JUDUL HALAMAN -->
            <h1 class="text-[20px] font-bold text-black mt-2 mb-8"> <!-- Judul halaman lupa password -->
                Lupa Password
            </h1>

            <!-- IKON GEMBOK -->
            <div class="w-32 h-32 bg-[#D8F6FF] rounded-full flex items-center justify-center mb-10 shadow-inner border border-blue-100"> <!-- Lingkaran berisi ikon gembok -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-[#0141A3]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"> <!-- Ikon gembok/kunci -->
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /> <!-- Bentuk ikon gembok -->
                </svg>
            </div>

            <!-- INSTRUKSI -->
            <p class="text-[14px] font-medium text-black leading-relaxed text-left w-full mb-4"> <!-- Instruksi untuk pengguna -->
                Masukkan email terdaftar Anda untuk menerima tautan reset. <!-- Penjelasan cara kerja fitur lupa password -->
            </p>

            <!-- FORM RESET PASSWORD -->
            <form id="forgotPasswordForm" class="w-full flex flex-col flex-grow"> <!-- Form dengan ID untuk diakses oleh JavaScript -->
                
                <!-- INPUT EMAIL -->
                <div class="relative w-full mb-auto"> <!-- Wadah input email -->
                    <input type="email" id="email_reset" placeholder="Masukkan Email Anda" required
                        class="w-full bg-white rounded-[10px] border border-black h-[55px] px-4 text-[14px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"> <!-- Kolom input email dengan border hitam -->
                </div>

                <!-- TOMBOL DAN TAUTAN BANTUAN -->
                <div class="w-full mt-10"> <!-- Wadah tombol di bagian bawah -->
                    <button type="submit" 
                        class="w-full bg-[#0141A3] hover:bg-blue-900 text-white font-semibold text-[13px] h-[48px] rounded-[10px] shadow-md transition-all active:scale-95 mb-4"> <!-- Tombol kirim tautan reset -->
                        Kirim Tautan
                    </button>

                    <!-- TAUTAN BANTUAN -->
                    <div class="text-[11px] text-gray-700"> <!-- Wadah teks bantuan -->
                        Butuh bantuan? <a href="#" class="text-[#0064F0] hover:underline font-medium">Hubungi Kami</a> <!-- Tautan ke layanan pelanggan -->
                    </div>
                </div>
            </form>

        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) { // Dengarkan event submit pada form lupa password
            e.preventDefault(); // Cegah perilaku submit bawaan browser (tidak reload halaman)
            const email = document.getElementById('email_reset').value; // Ambil email yang dimasukkan pengguna
            
            // Karena ini masih simulasi UI, kita beri notifikasi sukses
            alert(`Tautan untuk mereset password telah dikirim ke email: ${email}\nSilakan periksa kotak masuk Anda.`); // Tampilkan notifikasi simulasi pengiriman email
            
            // Opsional: kembali ke halaman login setelah berhasil
            window.location.href = "/login"; // Arahkan pengguna kembali ke halaman login
        });
    </script>
</body>
</html>
