    <!-- SCRIPT LOGIKA PROGRAM APLIKASI WEB (JS) -->
    <script>
        let googleClient; // Variabel penyimpan akses klien Google API

        // Inisialisasi bawaan Facebook saat SDK selesai termuat
        window.fbAsyncInit = function() { 
            FB.init({
                appId      : 'GANTI_DENGAN_FACEBOOK_APP_ID_ANDA', // Harus diisi dengan ID Aplikasi FB di dasbor dev FB
                cookie     : true, // Izinkan Facebook menggunakan cookies agar status login bertahan
                xfbml      : true, // Parse plugin sosial FB di halaman ini (jika ada)
                version    : 'v19.0' // Gunakan versi API Graph FB 19.0
            });
        };

        // Ketika halaman sepenuhnya terbuka dan siap digunakan
        document.addEventListener("DOMContentLoaded", function() {
            const userData = localStorage.getItem('user'); // Ambil data pengguna sementara yang sedang aktif di HP (localStorage)
            
            if(userData) { // Jika ada pengguna yang tersimpan/sedang aktif
                const user = JSON.parse(userData); // Terjemahkan dari teks jadi objek JS agar mudah dibaca
                
                // Isi form otomatis dengan data pengguna tersebut (Jika ada, jika tidak, biarkan kosong)
                if(user.nama) document.getElementById('edit-nama').value = user.nama; 
                document.getElementById('edit-telepon').value = user.no_telepon || user.telepon || "";
                if(user.email) document.getElementById('edit-email').value = user.email;

                // Memeriksa dan memuat foto profil khusus si pengguna (disimpan terpisah)
                const savedPic = localStorage.getItem('foto_profil_' + user.id); // Cari ID unik si user
                    if(savedPic) { // Jika ternyata user ini punya foto yang disimpan
                        document.getElementById('profile-pic-preview').src = savedPic; // Ganti gambar default dengan fotonya
                    }
                
                // Periksa apakah user pernah menautkan sosial media dari memori lokal (status pura-pura / mockup frontend)
                const fbLinked = user.isFbLinked || false; // Jika pernah LINK Facebook
                const googleLinked = user.isGoogleLinked || false; // Jika pernah LINK Google
                
                // Ubah status dan tulisan kotak FB dan Google sesuai keadaan di atas
                renderSocialStatus('facebook', fbLinked, user.nama);
                renderSocialStatus('google', googleLinked, user.nama);
            }

            // Inisialisasi bawaan Google Account saat Google SDK terdeteksi (OAUTH2)
            if(window.google) {
                googleClient = google.accounts.oauth2.initTokenClient({
                    client_id: 'GANTI_DENGAN_GOOGLE_CLIENT_ID_ANDA.apps.googleusercontent.com', // Harus diisi ID Klien Google 
                    scope: 'email profile openid', // Izin meminta nama lengkap dan email pengguna Google
                    callback: (response) => { // Jika login Google berhasil diklik dan diverifikasi
                        if (response && response.access_token) { // Pastikan akses didapat
                            linkAccount('google', 'Google User'); // Jalankan proses penautan akun Google di sistem aplikasi
                        }
                    },
                });
            }
        });

        // ===============================================
        // FUNGSI FOTO PROFIL
        // ===============================================
        // Fungsi mengganti foto profil
        function previewProfilePic(event) {
            const input = event.target; // Ambil elemen file tempat upload gambar
            if (input.files && input.files[0]) { // Pastikan pengguna benar-benar memilih file gambar (tidak batal)
                const reader = new FileReader(); // Buat program pembaca file internal
                reader.onload = function(e) { // Kejadian ketika foto selesai dibaca
                    // Update/ganti tampilan foto pada antarmuka bulat di atas layar
                    document.getElementById('profile-pic-preview').src = e.target.result;
                    
                    // Simpan foto secara permanen (tapi offline) di "Kamar Terpisah" berdasarkan ID User 
                    let user = JSON.parse(localStorage.getItem('user')) || {};
                    if (user.id) {
                        localStorage.setItem('foto_profil_' + user.id, e.target.result); // Menyimpan format tulisan panjang gambar ke memori ponsel (Base64)
                    }
                };
                reader.readAsDataURL(input.files[0]); // Mulai perintahkan membaca file menjadi kode teks panjang
            }
        }

        // ===============================================
        // FUNGSI LINK / UNLINK SOSIAL MEDIA
        // ===============================================
        // Fungsi merubah tampilan saat tombol sosmed diubah dari LINK <-> UNLINK
        function renderSocialStatus(platform, isLinked, userName) {
            const statusElement = document.getElementById(`${platform}-status`); // Teks (LINK/UNLINK)
            const textElement = document.getElementById(`${platform}-text`); // Teks (Google / Nama FB / Nama Google)
            
            if (isLinked) { // Jika posisinya sedang TERTAUT
                statusElement.textContent = "UNLINK"; // Ubah tombol kanan jadi UNLINK
                statusElement.classList.replace("text-[#0062E6]", "text-red-500"); // Ubah warna LINK (biru) menjadi UNLINK (merah)
                textElement.textContent = userName || "Pengguna";  // Ganti teks Google/FB menjadi nama si Pengguna tersebut
            } else { // Jika posisinya TERPUTUS / belum terhubung
                statusElement.textContent = "LINK"; // Ubah tombol kanan jadi LINK
                statusElement.classList.replace("text-red-500", "text-[#0062E6]"); // Ubah warna kembali ke biru tua
                textElement.textContent = platform.charAt(0).toUpperCase() + platform.slice(1); // Balikkan nama ke default (Cth: tulisan "Google")
            }
        }

        // Fungsi yang dipanggil saat baris Facebook atau Google di layar diklik
        function toggleSocialLink(platform) {
            let user = JSON.parse(localStorage.getItem('user')) || {}; // Ambil data
            // Cek kondisi sekarang (Sudah terkait atau belum?) dari memori ponsel
            const isLinked = platform === 'facebook' ? user.isFbLinked : user.isGoogleLinked;

            if (isLinked) { // Jika sudah terkait -> MAKA KITA INGIN MEMUTUSKANNYA (UNLINK)
                if(platform === 'facebook') user.isFbLinked = false; // Tandai FB Putus
                if(platform === 'google') user.isGoogleLinked = false; // Tandai Google Putus
                localStorage.setItem('user', JSON.stringify(user)); // Simpan catatan putus tersebut ke ponsel
                renderSocialStatus(platform, false, user.nama); // Jalankan perubahan visual layar ke mode belum terkait
            } else { // Jika belum terkait -> MAKA KITA INGIN MENGHUBUNGKANNYA (LINK)
                if (platform === 'facebook') { // Jika klik FB
                    if(typeof FB === 'undefined') { // Cegah error jika FB SDK gagal termuat (misal karena diblok adblocker / internet lambat)
                        tampilModalPeringatan("SDK Facebook sedang memuat. Coba lagi."); return;
                    }
                    // Minta FB membuka Pop up login miliknya sendiri
                    FB.login(function(response) { 
                        if (response.authResponse) { // Jika user sukses login akun FB dan menyetujui izin
                            FB.api('/me', {fields: 'name'}, function(res) { // Minta data profil fbnya (nama)
                                linkAccount('facebook', res.name); // Simpan nama di sistem kita
                            });
                        } else {
                            console.log('Login Facebook dibatalkan pengguna.'); // Jika user tutup kotak FB di tengah jalan
                        }
                    }, {scope: 'public_profile,email'}); // Permintaan hak untuk akses email FB
                    
                } else if (platform === 'google') { // Jika klik Google
                    if(googleClient) { // Pastikan inisialisasi awal Google SDK sukses
                        googleClient.requestAccessToken(); // Panggil kotak pop up permintaan akun google resmi
                    } else { // Jika SDK gagal termuat (Cth offline)
                        tampilModalPeringatan("SDK Google gagal dimuat. Periksa koneksi internet."); 
                    }
                }
            }
        }

        // Fungsi pembantu untuk menyimpan status sukses LINK ke sistem/memori ponsel
        function linkAccount(platform, accountName) {
            let user = JSON.parse(localStorage.getItem('user')) || {}; // Ambil data memori hp
            if(platform === 'facebook') user.isFbLinked = true; // Tandai terkait
            if(platform === 'google') user.isGoogleLinked = true; // Tandai terkait
            localStorage.setItem('user', JSON.stringify(user)); // Simpan data
            
            renderSocialStatus(platform, true, accountName); // Merubah tampilan visual ke mode terhubung
            // Tampilkan pop up kecil memberitahu berhasil terhubung
            alert(`Berhasil menautkan akun ${platform} Anda!`);
        }

        // ===============================================
        // FUNGSI MODAL PERINGATAN KUSTOM
        // ===============================================
        // Fungsi memunculkan pop up kuning (Peringatan/Error)
        function tampilModalPeringatan(pesan) {
            document.getElementById('warningMessage').textContent = pesan; // Masukkan teks error baru ke tengah pop up
            const modal = document.getElementById('warningModal'); // Ambil background gelap
            const modalContent = document.getElementById('warningModalContent'); // Ambil kotak pop up
            
            modal.classList.remove('hidden'); // Munculkan pop up agar merender di layar
            modal.classList.add('flex'); // Set perataan konten agar tetap di tengah
            
            setTimeout(() => { // Animasi mulus masuk setelah elemen aktif (perlu jeda kecil Javascript)
                modal.classList.remove('opacity-0'); 
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // Fungsi menyembunyikan pop up kuning
        function tutupModalPeringatan() {
            const modal = document.getElementById('warningModal');
            const modalContent = document.getElementById('warningModalContent');
            
            // Animasi mulus keluar
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            
            setTimeout(() => { // Sembunyikan elemen secara total setelah animasi (300 ms) berakhir
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // ===============================================
        // FUNGSI SIMPAN PROFIL DENGAN VALIDASI POP-UP
        // ===============================================
        // Fungsi untuk mengirim form profil yang diedit ke sistem Server Database (Backend SpringBoot)
        async function simpanProfil() {
            const newNama = document.getElementById('edit-nama').value.trim(); // Ambil isi input Nama lalu buang sisa spasi kosong di depan/belakang teks
            const newTelepon = document.getElementById('edit-telepon').value.trim(); // Sama untuk Telp
            const newEmail = document.getElementById('edit-email').value.trim(); // Sama untuk Email

            // Pengecekan sebelum kirim: Cek jika ada input yang lupa diisi (Syarat validasi tidak boleh ada yang kosong!)
            if (!newNama || !newTelepon || !newEmail) {
                tampilModalPeringatan("Nama Lengkap, Nomor Telepon, dan Alamat Email tidak boleh kosong. Silakan lengkapi data Anda sebelum menyimpan."); // Munculkan error!
                return; // Batalkan proses simpan! (Hentikan JS berjalan)
            }

            let user = JSON.parse(localStorage.getItem('user')) || {}; // Jika data sudah penuh, ambil ID pengenal user
            
            // Siapkan paket bingkisan (Payload) data terupdate yang ingin dititipkan ke Server
            const updateData = {
                id: user.id, // Pengenal User (sangat penting untuk DB tau siapa yang diubah)
                nama: newNama,
                no_telepon: newTelepon,
                email: newEmail
            };

            try {
                // Mengetuk pintu server Backend untuk minta Data di UPDATE (Methode HTTP: PUT)
                const response = await fetch('/api/update-profile', { // Mengirim ke URL Controller REST API Spring
                    method: 'PUT', // Aturan Rest, merubah keseluruhan pakai PUT
                    headers: { 'Content-Type': 'application/json' }, // Format bingkisan adalah teks JSON
                    body: JSON.stringify(updateData) // Ubah Paket menjadi teks tunggal
                });

                const result = await response.json(); // Menerima balasan pelayan (Server DB) apakah sukses / gagal dan kenapa

                if (response.ok) { // Jika status HTTP kode 200/2xx (berhasil terubah)
                    // Server sukses berubah. Selanjutnya ganti juga data yang masih teringat di memori lokal ponsel agar tidak kembali seperti semula!
                    user.nama = newNama;
                    user.no_telepon = newTelepon; 
                    user.telepon = newTelepon;    
                    user.email = newEmail;
                    localStorage.setItem('user', JSON.stringify(user)); // Timpa paksa data lama ponsel

                    // Munculkan Pop up Centang Hijau (Sukses)
                    const modal = document.getElementById('saveModal');
                    const modalContent = document.getElementById('saveModalContent');
                    
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    
                    setTimeout(() => { // Animasi mulus pop up sukses
                        modal.classList.remove('opacity-0');
                        modal.classList.add('opacity-100');
                        modalContent.classList.remove('scale-90');
                        modalContent.classList.add('scale-100');
                    }, 10);

                } else { // Jika Server menolak memproses (Mungkin karena sistem DB eror atau format salah)
                    tampilModalPeringatan("Gagal menyimpan profil: " + result.message); // Tampilkan alasan dari Server ke layar HP user
                }

            } catch (error) { // Terjadi Jika Pintu Server terkunci/tertutup (seperti koneksi internet user putus)
                tampilModalPeringatan("Kesalahan Jaringan. Pastikan server backend berjalan."); // Tampilkan peringatan koneksi
                console.error(error); // Catat kerusakan teknikal pada memori pengembang (console log browser)
            }
        }

        // ===============================================
        // FUNGSI HAPUS AKUN PERMANEN
        // ===============================================
        // Fungsi memunculkan pop up layar merah (Hapus Akun?) untuk bertanya yakin atau tidak
        function konfirmasiHapusAkun() {
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { // Animasi muncul popup konfirmasi berbahaya
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // Fungsi menyembunyikan/menghilangkan pop up layah merah tadi saat di klik Batal
        function tutupModalHapus() {
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            setTimeout(() => { // Animasi keluar sebelum benar-benar disembunyikan JS (300 ms)
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // Fungsi fatal mendelete total akun ke server
        async function eksekusiHapusAkun() {
            let user = JSON.parse(localStorage.getItem('user')); // Identifikasi user (siapa yang mau dihapus?)
            if (!user || !user.id) { // Jika tak ditemukan identitas di ponsel
                tampilModalPeringatan("Gagal mengidentifikasi akun. Silakan login ulang."); return; // Mungkin sesi ilegal? Batalkan.
            }
            try {
                // Mengetuk server API secara frontal dengan instruksi pembasmian data secara mutlak (Metode HTTP: DELETE) pada satu ID User itu
                const response = await fetch(`/api/delete-account/${user.id}`, {
                    method: 'DELETE', headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) { // Jika server setuju untuk membakar identitas akun tersebut
                    localStorage.removeItem('user'); // Buang sisa-sisa ingatan ponsel ini dari akun yang terbakar
                    // Menggunakan alert bawaan agar eksekusi pindah halaman mulus, memberi pesan terakhir sebelum reset aplikasi web
                    alert("Akun Anda telah berhasil dihapus secara permanen.");
                    window.location.href = "/login"; // Kembalikan ke gerbang pendaftaran/masuk awal (Force Logout)
                } else { // Jika server enggan menghapus dengan suatu alasan fatal DB (Constraint Key, dll)
                    const result = await response.json(); // Ambil respon tolak
                    tampilModalPeringatan("Gagal menghapus akun: " + result.message); // Tampilkan alasan penolakan pada popup layar Hp 
                    tutupModalHapus(); // Tutup mode Konfirmasi hapus dan kembali
                }
            } catch (error) { // Jika ponsel mati koneksi saat eksekusi fatal ini
                tampilModalPeringatan("Kesalahan Jaringan. Tidak dapat terhubung ke server."); // Peringatkan gagal internet
                tutupModalHapus(); // Tutup pop up
            }
        }
    </script>
