    <script src="https://cdn.tailwindcss.com"></script> <!-- Mengambil alat bantu desain instan (Tailwind CSS) secara online dari internet -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"> <!-- Mengimpor jenis huruf modern 'Montserrat' dari gudang Google Fonts -->

        body {
            background-color: #F1F1F1; /* Mengecat seluruh latar belakang area di luar bingkai HP menjadi abu-abu pucat */
            font-family: 'Montserrat', sans-serif; /* Memaksa semua teks di halaman ini memakai huruf Montserrat */
            overscroll-behavior-y: none; /* Menghilangkan efek pantulan karet saat layar digulir mentok ke bawah di HP */
            margin: 0; /* Menghapus jarak tepian halaman agar tampilan melekat erat di pinggir layar */
        }

        /* PERINTAH ANIMASI HALAMAN MASUK */
        .slide-in-right {
            animation: slideIn 0.3s ease-out forwards; /* Panggil sutradara animasi 'slideIn' berdurasi 0.3 detik dengan gerakan halus (ease-out) */
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); } /* Adegan awal: Wujud tembus pandang (tak terlihat) bergeser dari arah kanan layar */
            to { opacity: 1; transform: translateX(0); } /* Adegan akhir: Menjadi nyata (terlihat 100%) dan memusat diam di tengah layar */
        }

        /* PERINTAH ANIMASI PERGANTIAN MENU TAB */
        .fade-in {
            animation: fadeIn 0.2s ease-in-out forwards; /* Panggil sutradara animasi 'fadeIn' berdurasi sangat cepat (0.2 detik) */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); } /* Adegan awal: Muncul perlahan dari arah sedikit ke bawah layar */
            to { opacity: 1; transform: translateY(0); } /* Adegan akhir: Wujud padat dan diam di posisi aslinya */
        }

        /* DUA JURUS PENGHILANG GARIS GULIR (SCROLLBAR) */
        .hide-scrollbar::-webkit-scrollbar { display: none; } /* Menyembunyikan batang gulir (scrollbar) pada browser turunan Google Chrome dan Safari */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } /* Menyembunyikan batang gulir khusus untuk peramban Firefox dan Edge versi lama */
    </style>
</head>

    <!-- PUSAT OTAK MESIN DAN LOGIKA PERGERAKAN JALANNYA WEB (JAVASCRIPT) -->
    <script>
        // MESIN TUKANG GANTI GANTI HALAMAN TAB (SULAP MUNCUL-HILANGKAN KONTEN)
        // Dipicu saat Pengguna menyentuh nama Tab "Aktivitas" atau "Riwayat" di baris atas tadi
        function switchTab(tabName) {
            // Kita cari dulu bahan-bahan yang mau kita mainin warnanya..
            const lineAktivitas = document.getElementById('line-aktivitas'); // Garis bawah tab Aktivitas
            const lineRiwayat = document.getElementById('line-riwayat'); // Garis bawah tab Riwayat
            const contentAktivitas = document.getElementById('view-aktivitas'); // Seluruh isi blok tab Aktivitas (Banyak tombol SOSMED)
            const contentRiwayat = document.getElementById('view-riwayat'); // Seluruh isi blok Riwayat (Yang isinya cma teks Kosong dsb)

            // JIKA JARI ORANG MENEKAN TAB 'RIWAYAT' !
            if (tabName === 'riwayat') {
                // SULAP WARNA GARIS BAWAHNYA: Matikan garis aktivitas jadi Abu-abu, dan Nyalakan garis Riwayat jadi Biru!
                lineAktivitas.classList.replace('bg-[#0062E6]', 'bg-[#D9D9D9]'); 
                lineRiwayat.classList.replace('bg-[#D9D9D9]', 'bg-[#0062E6]');
                
                // SULAP GANTI LEMBARAN: Usir dan usir lembaran aktivitas menjadi 'hidden' (ghaib/sembunyi), dan Munculkan halaman riwayat jadi 'flex' (Tampil Nyata Memusat)!
                contentAktivitas.classList.replace('flex', 'hidden'); 
                contentRiwayat.classList.replace('hidden', 'flex');
            
            // TAPI, JIKA JARI ORANG MENEKAN KEMBALI TAB 'AKTIVITAS' !
            } else {
                // LAKUKAN ILMU PEMBALIKAN: Matikan garis riwayat jadi Abu lagi, Nyalakan garis Biru di aktivitas lagi!
                lineRiwayat.classList.replace('bg-[#0062E6]', 'bg-[#D9D9D9]');
                lineAktivitas.classList.replace('bg-[#D9D9D9]', 'bg-[#0062E6]');
                
                // BALIKIN LAGI LEMBARANNYA: Semubnyikan riwayat yg kosong tadi, Munculkan dan pamerkan kembali deretan tombol SOSMED!
                contentRiwayat.classList.replace('flex', 'hidden');
                contentAktivitas.classList.replace('hidden', 'flex');
            }
        }

        // MESIN TUKANG NYALIN TULISAN RAHASIA (Tarik Kata Menuju Papan Klip / Clipboard HP)
        // Dipicu saat pengguna nekan tombol "SALIN CODE"
        function copyCode() {
            // Curi dan intip tulisan angka apa yang tertera di kotak HTML tadi (Misalnya 9024191)
            const codeText = document.getElementById('referralCode').innerText; 
            
            // Paksa Jari Tangan Robot HP (Navigator Clipboard) untuk menulis dan mengingat huruf tersebut agar bisa di 'Paste' (Tempel) dimana saja oleh pemilik HP!
            navigator.clipboard.writeText(codeText).then(() => {
                // Jika Berhasil Menarik Nyawa Hurufnya:
                alert("Kode Referral '" + codeText + "' berhasil disalin!"); // Tampar Muka Pengguna pakai Kotak Pesan Bawaan Browser "Sukses Disalin Bos!"
            }).catch(err => {
                // Jika Gagal (Mungkin Browser HP nya jelek membatasi izin sistem salin):
                console.error('Gagal menyalin kode: ', err); // Simpan pesan errornya diam-diam di catetan komputer programmer. (Biar tak bikin takut pengguna mall)
            });
        }
    </script>
