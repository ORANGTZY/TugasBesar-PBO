<!DOCTYPE html> <!-- Deklarasi bahwa ini adalah dokumen HTML5 -->
<html lang="id"> <!-- Elemen akar halaman, bahasa Indonesia -->
<head> <!-- Bagian kepala halaman — berisi pengaturan dan sumber daya -->
    <meta charset="UTF-8"> <!-- Mengatur karakter encoding ke UTF-8 agar teks bahasa Indonesia tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- Mengatur tampilan agar menyesuaikan layar HP, tanpa zoom -->
    <meta name="theme-color" content="#1A73E8"> <!-- Warna tema browser di HP Android -->
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- Mengizinkan halaman ini digunakan sebagai web app di iPhone -->
    <meta name="mobile-web-app-capable" content="yes"> <!-- Mengizinkan halaman ini digunakan sebagai web app di Android -->
    
    <title>Parkirin - Register</title> <!-- Judul tab browser -->
    <link rel="icon" href="/img/favicon.png" type="image/png"> <!-- Ikon kecil yang muncul di tab browser -->
    
    <script src="https://cdn.tailwindcss.com"></script> <!-- Mengimpor Tailwind CSS dari internet untuk membuat tampilan -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"> <!-- Mengimpor font Montserrat dari Google Fonts -->
    
    <script src="https://accounts.google.com/gsi/client" async defer></script> <!-- Mengimpor library Google Sign-In -->

    <style> 
        body {
            background-color: #1A73E8; /* Warna latar belakang biru utama */
            background-image: radial-gradient(circle at 10% 20%, rgba(172, 198, 255, 0.2) 0%, transparent 40%), /* Efek gradien cahaya di kiri atas */
                              radial-gradient(circle at 90% 80%, rgba(126, 171, 255, 0.2) 0%, transparent 40%); /* Efek gradien cahaya di kanan bawah */
            font-family: 'Montserrat', sans-serif; /* Gunakan font Montserrat untuk semua teks */
            overscroll-behavior-y: none; /* Mencegah halaman bergulir berlebih saat ditarik */
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased"> <!-- Badan halaman: tata letak tengah, tinggi minimal penuh layar -->

    <div id="fb-root"></div> <!-- Elemen wajib untuk inisialisasi Facebook SDK -->
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/id_ID/sdk.js"></script> <!-- Mengimpor library Facebook SDK -->

    <!-- WADAH UTAMA HALAMAN REGISTER -->
    <div class="w-full max-w-[402px] flex flex-col min-h-screen relative px-4 py-8"> <!-- Wadah konten: lebar maksimal 402px, padding horizontal dan vertikal -->
        
        <!-- LOGO PARKIRIN -->
        <div class="flex justify-center items-center mb-8 mt-4"> <!-- Wadah logo dengan margin atas dan bawah -->
            <img src=".//img/LOGO.png" alt="Logo Parkirin" class="h-10 object-contain drop-shadow-md"> <!-- Logo Parkirin dengan bayangan -->
        </div>

        <!-- FORM PENDAFTARAN AKUN -->
        <div class="bg-[#FFFFFF] rounded-[10px] p-4 shadow-lg mb-5 w-full relative z-10"> <!-- Kotak putih berisi form pendaftaran -->
            <h2 class="text-[20px] font-bold text-[#475569] text-center mb-5 mt-2">Selamat Datang</h2> <!-- Judul form pendaftaran -->

            <form id="registerForm" class="space-y-4" novalidate> <!-- Form pendaftaran dengan validasi manual lewat JavaScript -->
                
                <!-- INPUT NOMOR TELEPON -->
                <div class="flex flex-col text-left"> <!-- Kolom input nomor telepon -->
                    <label class="text-[10px] font-bold text-[#475569] mb-1 ml-1">Nomor Telepon Aktif</label> <!-- Label di atas kolom input -->
                    <input type="tel" id="no_telepon" placeholder="Contoh: 08123456789" required
                        class="w-full bg-[#F6F6F6] rounded-[5px] h-[48px] px-4 text-[12px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all"> <!-- Kolom input nomor telepon -->
                </div>

                <!-- INPUT EMAIL -->
                <div class="flex flex-col text-left"> <!-- Kolom input email -->
                    <label class="text-[10px] font-bold text-[#475569] mb-1 ml-1">Alamat Email</label> <!-- Label di atas kolom input -->
                    <input type="email" id="email" placeholder="contoh@email.com" required
                        class="w-full bg-[#F6F6F6] rounded-[5px] h-[48px] px-4 text-[12px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all"> <!-- Kolom input email -->
                </div>

                <!-- INPUT NAMA LENGKAP -->
                <div class="flex flex-col text-left"> <!-- Kolom input nama -->
                    <label class="text-[10px] font-bold text-[#475569] mb-1 ml-1">Nama Lengkap</label> <!-- Label di atas kolom input -->
                    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap Anda" required
                        class="w-full bg-[#F6F6F6] rounded-[5px] h-[48px] px-4 text-[12px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all"> <!-- Kolom input nama lengkap -->
                </div>

                <!-- INPUT KATA SANDI -->
                <div class="flex flex-col text-left"> <!-- Kolom input kata sandi -->
                    <label class="text-[10px] font-bold text-[#475569] mb-1 ml-1">Kata Sandi</label> <!-- Label di atas kolom input -->
                    <div class="relative w-full"> <!-- Wadah relatif agar tombol mata bisa diposisikan di dalam kolom -->
                        <input type="password" id="password" placeholder="Masukkan Kata Sandi" required
                            class="w-full bg-[#F6F6F6] rounded-[5px] h-[48px] px-4 text-[12px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all"> <!-- Kolom input kata sandi -->
                        <button type="button" onclick="togglePassword('password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-cyan-400 focus:outline-none"> <!-- Tombol untuk tampilkan/sembunyikan kata sandi -->
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg> <!-- Ikon mata untuk tampilkan/sembunyikan kata sandi -->
                        </button>
                    </div>
                </div>

                <!-- INPUT KONFIRMASI KATA SANDI -->
                <div class="flex flex-col text-left"> <!-- Kolom konfirmasi kata sandi -->
                    <label class="text-[10px] font-bold text-[#475569] mb-1 ml-1">Konfirmasi Kata Sandi</label> <!-- Label di atas kolom input -->
                    <div class="relative w-full"> <!-- Wadah relatif agar tombol mata bisa diposisikan di dalam kolom -->
                        <input type="password" id="confirm_password" placeholder="Ketik Ulang Kata Sandi" required
                            class="w-full bg-[#F6F6F6] rounded-[5px] h-[48px] px-4 text-[12px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all"> <!-- Kolom konfirmasi kata sandi -->
                        <button type="button" onclick="togglePassword('confirm_password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-cyan-400 focus:outline-none"> <!-- Tombol untuk tampilkan/sembunyikan konfirmasi kata sandi -->
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg> <!-- Ikon mata untuk tampilkan/sembunyikan konfirmasi kata sandi -->
                        </button>
                    </div>
                </div>

                <!-- TOMBOL DAFTAR -->
                <button type="button" onclick="validateAndSubmitRegister()"
                    class="w-full bg-[#89E7F9] hover:bg-cyan-300 text-[#F5F5F5] font-semibold text-[13px] h-[47px] rounded-[10px] mt-4 transition-all active:scale-95 shadow-sm"> <!-- Tombol submit form pendaftaran -->
                    DAFTAR
                </button>
            </form>
        </div>

        <!-- OPSI DAFTAR DENGAN SOSIAL MEDIA -->
        <div class="bg-[#FFFFFF] rounded-[10px] p-5 shadow-lg w-full flex flex-col items-center justify-center h-[150px] relative z-10"> <!-- Kotak putih untuk opsi pendaftaran alternatif -->
            <p class="text-[12px] font-bold text-[#8A8A8A] mb-4">ATAU DAFTAR MENGGUNAKAN</p> <!-- Teks pemisah -->
            <div class="flex gap-6 mb-4"> <!-- Wadah untuk tombol-tombol login sosial -->
                <button type="button" onclick="loginWithFacebook()" class="w-[50px] h-[50px] rounded-full shadow-md hover:opacity-90 active:scale-95 transition-all overflow-hidden flex items-center justify-center border border-gray-100 bg-white"> <!-- Tombol daftar dengan Facebook -->
                    <img src=".//img/iconfacebook.png" alt="Login Facebook" class="w-full h-full object-cover"> <!-- Ikon Facebook -->
                </button>
                <button type="button" onclick="loginWithGoogle()" class="w-[50px] h-[50px] rounded-full shadow-md hover:opacity-90 active:scale-95 transition-all overflow-hidden flex items-center justify-center border border-gray-100 bg-white p-1"> <!-- Tombol daftar dengan Google -->
                    <img src=".//img/icongoogle.png" alt="Login Google" class="w-full h-full object-contain"> <!-- Ikon Google -->
                </button>
            </div>
            <div class="relative w-full text-center mt-2"> <!-- Wadah tautan login -->
                <span class="text-[10px] text-gray-500 relative top-[-4px]">Sudah punya akun? </span> <!-- Teks ajakan masuk untuk pengguna lama -->
                <a href="/login" class="text-[10px] text-[#42BEE2] font-semibold hover:underline relative top-[-4px]">Login Sekarang</a> <!-- Tautan ke halaman login -->
            </div>
        </div>

        <!-- MODAL NOTIFIKASI (Sukses/Gagal) -->
        <div id="registerModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 backdrop-blur-sm transition-opacity opacity-0"> <!-- Latar semi-transparan modal, tersembunyi secara default -->
            <div id="registerModalContent" class="bg-white w-[300px] rounded-[20px] p-6 flex flex-col items-center shadow-2xl transform scale-90 transition-transform duration-300"> <!-- Kotak konten modal -->
                <div id="modalIconContainer" class="w-14 h-14 rounded-full flex items-center justify-center mb-4"></div> <!-- Wadah ikon modal (diisi oleh JavaScript) -->
                <h3 id="modalTitle" class="text-[18px] font-bold text-black mb-2 text-center"></h3> <!-- Judul modal (diisi oleh JavaScript) -->
                <p id="modalMessage" class="text-[12px] font-medium text-gray-500 text-center mb-6 leading-relaxed"></p> <!-- Pesan modal (diisi oleh JavaScript) -->
                <button id="modalBtn" class="w-full text-white font-bold py-2.5 rounded-[12px] text-[12px] transition-colors shadow-md active:scale-95"></button> <!-- Tombol aksi modal (diisi oleh JavaScript) -->
            </div>
        </div>

    </div>

    <script>
        // INISIALISASI OAUTH FACEBOOK & GOOGLE
        let googleClient; // Variabel untuk menyimpan objek client Google OAuth

        window.fbAsyncInit = function() { // Fungsi ini otomatis dipanggil saat Facebook SDK selesai dimuat
            FB.init({ // Inisialisasi Facebook SDK dengan konfigurasi
                appId      : 'GANTI_DENGAN_FACEBOOK_APP_ID_ANDA', // ID aplikasi Facebook (perlu diganti dengan ID asli)
                cookie     : true, // Izinkan penggunaan cookie untuk sesi login
                xfbml      : true, // Izinkan parsing elemen Facebook di HTML
                version    : 'v19.0' // Versi API Facebook yang digunakan
            });
        };

        window.onload = function() { // Fungsi ini dipanggil saat seluruh halaman selesai dimuat
            if(window.google) { // Cek apakah library Google sudah tersedia
                googleClient = google.accounts.oauth2.initTokenClient({ // Inisialisasi client OAuth2 Google
                    client_id: 'GANTI_DENGAN_GOOGLE_CLIENT_ID_ANDA.apps.googleusercontent.com', // Client ID Google (perlu diganti)
                    scope: 'email profile openid', // Minta izin akses email, profil, dan identitas
                    callback: (response) => { // Fungsi dipanggil setelah login Google selesai
                        if (response && response.access_token) { // Jika login berhasil dan ada token akses
                            showModal(true, 'Login Google Berhasil!', 'Autentikasi Google berhasil dilakukan. Silakan masuk.', '/user-dashboard'); // Tampilkan modal sukses
                        }
                    },
                });
            }
        };

        function loginWithFacebook() { // Fungsi untuk memulai proses login/daftar dengan Facebook
            if(typeof FB === 'undefined') { // Cek apakah Facebook SDK sudah dimuat
                showModal(false, 'Gagal', 'SDK Facebook sedang memuat. Periksa internet Anda dan coba lagi.'); return; // Tampilkan error jika SDK belum siap
            }
            FB.login(function(response) { // Buka popup login Facebook
                if (response.authResponse) { // Jika pengguna berhasil login
                    FB.api('/me', {fields: 'name'}, function(res) { // Ambil nama pengguna dari Facebook
                        showModal(true, 'Login Facebook Berhasil!', `Selamat datang, ${res.name}!`, '/user-dashboard'); // Tampilkan modal sukses
                    });
                } else { // Jika pengguna membatalkan login
                    console.log('Login Facebook dibatalkan pengguna.'); // Catat ke konsol developer
                }
            }, {scope: 'public_profile,email'}); // Minta izin akses profil publik dan email
        }

        function loginWithGoogle() { // Fungsi untuk memulai proses login dengan Google
            if(googleClient) { // Jika Google OAuth sudah dikonfigurasi
                googleClient.requestAccessToken(); // Buka popup login Google
            } else { // Jika Google OAuth belum dikonfigurasi
                showModal(false, 'Gagal', 'SDK Google gagal dimuat. Periksa koneksi internet Anda.'); // Tampilkan pesan error
            }
        }

        function togglePassword(inputId, button) { // Fungsi untuk menampilkan atau menyembunyikan kata sandi
            const input = document.getElementById(inputId); // Ambil elemen input berdasarkan ID
            if (input.type === 'password') { // Jika kata sandi sedang disembunyikan
                input.type = 'text'; // Ubah ke teks agar terlihat
                button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`; // Ganti ikon ke mata dicoret
            } else { // Jika kata sandi sedang ditampilkan
                input.type = 'password'; // Sembunyikan kembali
                button.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`; // Kembalikan ikon ke mata normal
            }
        }

        function showModal(isSuccess, title, message, redirectUrl = null) { // Fungsi untuk menampilkan modal notifikasi
            const modal = document.getElementById('registerModal'); // Ambil elemen modal
            const modalContent = document.getElementById('registerModalContent'); // Ambil konten modal
            const iconContainer = document.getElementById('modalIconContainer'); // Ambil wadah ikon
            const btn = document.getElementById('modalBtn'); // Ambil tombol modal
            
            document.getElementById('modalTitle').textContent = title; // Isi judul modal
            document.getElementById('modalMessage').textContent = message; // Isi pesan modal

            if(isSuccess) { // Jika status sukses
                iconContainer.className = "w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mb-4"; // Atur tampilan ikon hijau
                iconContainer.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`; // Ikon centang hijau
                btn.className = "w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-[12px] text-[12px] transition-colors shadow-md active:scale-95"; // Tombol hijau
                btn.textContent = "Silakan Masuk"; // Teks tombol sukses
                btn.onclick = () => { window.location.href = redirectUrl; }; // Klik tombol → pindah ke dashboard
            } else { // Jika status gagal/error
                iconContainer.className = "w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mb-4"; // Atur tampilan ikon merah
                iconContainer.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-[#E53935]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`; // Ikon silang merah
                btn.className = "w-full bg-[#E53935] hover:bg-red-700 text-white font-bold py-2.5 rounded-[12px] text-[12px] transition-colors shadow-md active:scale-95"; // Tombol merah
                btn.textContent = "Perbaiki Data"; // Teks tombol error
                btn.onclick = () => { // Klik tombol → tutup modal
                    modal.classList.remove('opacity-100'); // Hapus opacity penuh
                    modal.classList.add('opacity-0'); // Buat transparan
                    modalContent.classList.remove('scale-100'); // Hapus ukuran normal
                    modalContent.classList.add('scale-90'); // Kembalikan ke ukuran lebih kecil
                    setTimeout(() => {
                        modal.classList.add('hidden'); // Sembunyikan modal
                        modal.classList.remove('flex'); // Hapus display flex
                    }, 300); // Tunggu 300ms agar animasi selesai
                };
            }

            modal.classList.remove('hidden'); // Tampilkan modal
            modal.classList.add('flex'); // Gunakan flex layout
            setTimeout(() => { // Tunggu 10ms agar transisi CSS bisa berjalan
                modal.classList.remove('opacity-0'); // Buat latar modal terlihat
                modal.classList.add('opacity-100'); // Transparansi penuh
                modalContent.classList.remove('scale-90'); // Hapus efek mengecil
                modalContent.classList.add('scale-100'); // Ukuran normal
            }, 10);
        }

        async function validateAndSubmitRegister() { // Fungsi untuk memvalidasi form dan mengirim data pendaftaran
            const nama = document.getElementById('nama'); // Ambil elemen input nama
            const email = document.getElementById('email'); // Ambil elemen input email
            const no_telepon = document.getElementById('no_telepon'); // Ambil elemen input nomor telepon
            const password = document.getElementById('password'); // Ambil elemen input kata sandi
            const confirm_password = document.getElementById('confirm_password'); // Ambil elemen konfirmasi kata sandi

            const inputs = [nama, email, no_telepon, password, confirm_password]; // Buat daftar semua elemen input
            inputs.forEach(input => input.classList.remove('ring-2', 'ring-red-500')); // Hapus highlight error dari semua input

            let isAnyEmpty = false; // Penanda apakah ada kolom yang masih kosong
            inputs.forEach(input => { // Periksa setiap kolom input
                if (!input.value.trim()) { // Jika kolom kosong
                    input.classList.add('ring-2', 'ring-red-500'); // Beri highlight merah
                    isAnyEmpty = true; // Tandai ada yang kosong
                }
            });

            if (isAnyEmpty) { // Jika ada kolom yang masih kosong
                showModal(false, 'Data Tidak Lengkap', 'Peringatan: Form tidak boleh kosong. Harap isi seluruh kolom yang tersedia sebelum mendaftar.'); // Tampilkan modal error
                return; // Hentikan proses pendaftaran
            }

            if (password.value !== confirm_password.value) { // Cek apakah kata sandi dan konfirmasinya sama
                showModal(false, 'Kata Sandi Berbeda', 'Kata sandi dan Konfirmasi kata sandi tidak cocok. Silakan periksa kembali.'); // Tampilkan modal error
                password.classList.add('ring-2', 'ring-red-500'); // Beri highlight merah pada kata sandi
                confirm_password.classList.add('ring-2', 'ring-red-500'); // Beri highlight merah pada konfirmasi
                return; // Hentikan proses pendaftaran
            }

            const dataUser = { // Buat objek data pengguna yang akan dikirim ke server
                nama: nama.value, // Nama lengkap pengguna
                email: email.value, // Alamat email pengguna
                no_telepon: no_telepon.value, // Nomor telepon pengguna
                password: password.value // Kata sandi pengguna
            };

            try {
                const response = await fetch('/api/register', { // Kirim permintaan POST ke API pendaftaran
                    method: 'POST', // Gunakan metode POST
                    headers: { 'Content-Type': 'application/json' }, // Beritahu server data dalam format JSON
                    body: JSON.stringify(dataUser) // Ubah objek data menjadi format JSON
                });
                const result = await response.json(); // Ubah respons server dari JSON menjadi objek JavaScript
                
                if (response.ok) { // Jika pendaftaran berhasil
                    showModal(true, 'Registrasi Berhasil!', `Selamat bergabung, ${nama.value}! Akun Anda telah berhasil dibuat.`, `/register-success?nama=${encodeURIComponent(nama.value)}`); // Tampilkan modal sukses dengan nama pengguna
                } else { // Jika pendaftaran gagal (misal email sudah terdaftar)
                    showModal(false, 'Gagal Mendaftar', result.message); // Tampilkan pesan error dari server
                }
            } catch (error) { // Jika terjadi error koneksi
                showModal(false, 'Kesalahan Jaringan', 'Terjadi kesalahan saat menghubungi server. Pastikan server Backend aktif.'); // Tampilkan modal error koneksi
            }
        }
    </script>
</body>
</html>
