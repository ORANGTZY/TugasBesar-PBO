# ============================================
# KONFIGURASI DATABASE MYSQL
# ============================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/smartpark_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# KONFIGURASI JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# KONFIGURASI THYMELEAF
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ============================================
# JACKSON (JSON Serialization)
# ============================================
spring.jackson.property-naming-strategy=SNAKE_CASE

# ============================================
# SERVER
# ============================================
server.port=8080

# ============================================
# SQL INIT (Seed data)
# ============================================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ============================================
# MIDTRANS Payment Gateway (Sandbox)
# Ganti nilai di bawah ini dengan key Midtrans kamu (jangan di-commit ke GitHub!)
# ============================================
midtrans.server-key=YOUR_MIDTRANS_SERVER_KEY
midtrans.client-key=YOUR_MIDTRANS_CLIENT_KEY
midtrans.is-production=false
